# vim:fileencoding=utf-8:foldmethod=marker

include current-theme.conf

# ── Fonts ──────────────────────────────────────────────────────────

font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Italic
bold_italic_font FiraCode Nerd Font Mono Bold Italic

font_size 12.0
disable_ligatures cursor
font_features FiraCodeNFM-Reg +zero +calt

# ── Cursor ─────────────────────────────────────────────────────────

cursor_text_color background
cursor_shape beam
cursor_beam_thickness 1.5
cursor_trail 100
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# ── Scrollback ─────────────────────────────────────────────────────

scrollback_lines 2000
scrollbar scrolled
scrollback_pager_history_size 100

progress_bar top

# ── Mouse ──────────────────────────────────────────────────────────

open_url_with default
detect_urls yes
show_hyperlink_targets ctrl
underline_hyperlinks hover

# ── Performance tuning ──────────────────────────────────────────────────

sync_to_monitor yes

# ── Terminal bell ──────────────────────────────────────────────────

enable_audio_bell yes
visual_bell_duration 0.5
bell_on_tab "🔔 "

# ── Window layout ──────────────────────────────────────────────────

remember_window_size yes
# initial_window_width  640
# initial_window_height 400

enabled_layouts Fat,Grid,Stack
active_border_color #8ba4b0
inactive_border_color #2d4f67

# ── Tab bar ────────────────────────────────────────────────────────

tab_bar_style powerline
tab_bar_min_tabs 2
tab_powerline_style angled
tab_activity_symbol "•"
tab_title_template "{index}: {title}"

# ── Color scheme ──────────────────────────────────────────────────────

# background_opacity 1.0
# background_image none
# background_tint 0.0

# ── Advanced ──────────────────────────────────────────────────────

shell .
editor .
allow_hyperlinks yes
shell_integration enabled
term xterm-kitty

# ── Shortcuts ──────────────────────────────────────────────────────

map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection
map kitty_mod+/ search_scrollback
map kitty_mod+enter new_window
map kitty_mod+w close_window
map kitty_mod+. next_window
map kitty_mod+, previous_window
map kitty_mod+right next_tab
map kitty_mod+left previous_tab
map kitty_mod+t new_tab
map kitty_mod+q close_tab
map kitty_mod+l next_layout
map kitty_mod+e open_url_with_hints
map kitty_mod+u kitten unicode_input
map kitty_mod+delete clear_terminal reset active
